<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Deepika ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* LOCK SCREEN */
#lock {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff758c;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
}

/* GIFT BOX */
#gift {
  font-size: 80px;
  cursor: pointer;
  margin-top: 20px;
}

/* MAIN */
#main {
  display: none;
  padding: 40px 20px;
  animation: fadeIn 2s;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

img {
  width: 220px;
  border-radius: 20px;
  margin-top: 20px;
}

.typing {
  margin-top: 20px;
  line-height: 1.6;
  white-space: pre-line;
}

/* HEARTS */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* FIREWORK */
.firework {
  position: absolute;
  width: 5px;
  height: 5px;
  background: white;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}

#ytplayer {
  width: 0;
  height: 0;
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
  <h2>Enter Your Name ❤️</h2>
  <input type="text" id="nameInput" placeholder="Your Name">
  <button onclick="unlock()">Open</button>
</div>

<!-- GIFT -->
<div id="giftScreen" style="display:none;">
  <h2>🎁 Tap Your Gift 🎁</h2>
  <div id="gift" onclick="openGift()">🎁</div>
</div>

<!-- MAIN -->
<div id="main">
  <h1>🎂 Happy Birthday Deepika ❤️</h1>

  <div class="typing" id="text"></div>

  <img src="https://i.postimg.cc/mk2890kG/Snapchat-1717768683.jpg">

  <iframe id="ytplayer" allow="autoplay"></iframe>
</div>

<script>

/* Unlock */
function unlock() {
  let name = document.getElementById("nameInput").value.toLowerCase();
  if (name === "deepika") {
    document.getElementById("lock").style.display = "none";
    document.getElementById("giftScreen").style.display = "block";
  } else {
    alert("Only for Deepika ❤️");
  }
}

/* Gift Open */
function openGift() {
  document.getElementById("giftScreen").style.display = "none";
  document.getElementById("main").style.display = "block";

  startFireworks();
  playMusic();
  typing();
}

/* FULL MESSAGE */
const message = `HAPPY BIRTHDAY TO YOU BUKUUUUU......❤️. Love you soo much deepika...💙 You know what , it's everyday since I've been missing you soo badly that what not , i cannot express but sure to be Missing you as much you do. 💗My love , this is going to be your 18th birthday, I wish you all the very best for your life ahead , we both have so many problems and difficulties in our lives recently but I'm sure one day these problems are going to fade away and just we'll be together peacefully , I believe that one day this might happen 💖. Aur han , naaraz to aap bhot ho mujhse ye mai janta hu , but I think you would forgive me by seeing my small efforts even while I'm not getting privacy , and managing somehow for you , and you know these problems are very disturbing for me so that's why I'm getting frustrated nhi to mai tumse bhot zyada pyaar karta hu , aur humesha karta rahunga ! Anyways we'll figure out that later , but now ! This is your 18th birthday so I want you to make it good even without me !!❤️ I don't want any excuses and rona dhona ! Cause I too know how much you've suffered and I've suffered tooo so... Make it good , I want to see you happy this time ! I don't want to listen ki nhi ho payega ! Hojayega ! Aur congratulations meri jaaaaaaaan ! You've did very best in ipe ! 98 % , you're making me jealous. But I'm very proud of you my love 💙and I know you'll study even more harder from now ! Just have patience and be focused, I want to see you happy lifetime, with me or without!💗 Aur meri jaan naaraazgi dur rakho aur acche se exam dena neet ka I wish you all the very best !!! I love you veryyy much ! Celebrate your birthday! No excuses this time ! Mai humesha apke saath hu ! Dhyan rakhna buku apna ! I love you sooo much ! And at last again I wish you a very very happy birthday loveee 💗`;

let i = 0;
function typing() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing, 30);
  }
}

/* Music */
function playMusic() {
  document.getElementById("ytplayer").src =
  "https://www.youtube.com/embed/L1ovV0zTmfs?autoplay=1&start=27";
}

/* Hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);

/* Fireworks */
function startFireworks() {
  for (let i = 0; i < 80; i++) {
    let f = document.createElement("div");
    f.className = "firework";

    let x = (Math.random() - 0.5) * 400 + "px";
    let y = (Math.random() - 0.5) * 400 + "px";

    f.style.setProperty('--x', x);
    f.style.setProperty('--y', y);

    f.style.left = "50%";
    f.style.top = "50%";

    document.body.appendChild(f);

    setTimeout(() => f.remove(), 1000);
  }
}

</script>

</body>
</html>
